<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="BamSignal — the right connection starts with a signal."
    />
    <meta name="theme-color" content="#1a0a2e" />
    <meta name="msapplication-TileColor" content="#1a0a2e" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    <meta property="og:title" content="BamSignal" />
    <meta property="og:description" content="The right connection starts with a signal." />
    <meta property="og:image" content="https://bamsignal.com/icons/icon-512.webp" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BamSignal" />
    <meta name="twitter:description" content="The right connection starts with a signal." />
    <meta name="twitter:image" content="https://bamsignal.com/icons/icon-512.webp" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/webp" href="/favicon.webp" data-brand-favicon="1" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="BamSignal" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="canonical" href="https://bamsignal.com/" />
    <meta name="bamsignal-build" content="__BAMSIGNAL_BUILD__" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <link rel="preload" as="image" href="/showcase/hero-lagos-young-professionals-01.webp" type="image/webp" />
    <title>BamSignal | Your signal starts here</title>
    <script>
      try {
        var t = localStorage.getItem("bamsignal-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.dataset.theme = t;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", t === "dark" ? "#1a0a2e" : "#fdf2f8");
          var fav = document.querySelector('link[data-brand-favicon]');
          if (fav) fav.href = t === "dark" ? "/favicon-dark.webp" : "/favicon-light.webp";
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var BOOT_RELOAD_KEY = "bamsignal-boot-reload";
        window.setTimeout(function () {
          var root = document.getElementById("root");
          if (!root || root.children.length) return;
          if (!sessionStorage.getItem(BOOT_RELOAD_KEY)) {
            sessionStorage.setItem(BOOT_RELOAD_KEY, "1");
            var url = new URL(window.location.href);
            url.searchParams.set("recover", String(Date.now()));
            window.location.replace(url.toString());
            return;
          }
          sessionStorage.removeItem(BOOT_RELOAD_KEY);
          root.innerHTML =
            '<main class="app-fallback" role="alert"><div class="app-fallback__card card"><h1>Having trouble loading</h1><p>Tap reload to try again.</p><button type="button" class="btn-primary btn-full" id="bamsignal-boot-reload">Reload</button></div></main>';
          var btn = document.getElementById("bamsignal-boot-reload");
          if (btn) {
            btn.addEventListener("click", function () {
              var url = new URL(window.location.href);
              url.searchParams.set("recover", String(Date.now()));
              window.location.replace(url.toString());
            });
          }
        }, 12000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
